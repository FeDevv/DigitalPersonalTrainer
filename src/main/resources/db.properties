# ==============================================================================
# CONFIGURAZIONE ACCESSO MULTI-RUOLO (RBAC lato DB)
# ==============================================================================
# Razionale di Sicurezza (Tesi):
# Per massimizzare la sicurezza granulare, l'applicazione non utilizza un unico
# utente amministrativo. Si adotta un approccio "Handshake & Switch":
# 1. Handshake: dpt_login verifica le credenziali.
# 2. Switching: L'app ricollega l'utente con il ruolo MariaDB specifico.
# Questo garantisce che i vincoli di sicurezza (GRANT/REVOKE) siano applicati
# direttamente dal kernel del Database, rendendo il sistema resiliente anche
# in caso di compromissione del layer applicativo (Defense in Depth).
# ==============================================================================

# Utente per la fase di autenticazione iniziale (Permessi: sola lettura credenziali)
db.login.user=dpt_login
db.login.password=dpt_login_pwd

# Utente Ruolo: Proprietario (Permessi: Full CRUD)
db.proprietario.user=dpt_proprietario
db.proprietario.password=dpt_prop_pwd

# Utente Ruolo: Personal Trainer (Permessi: CRUD schede, SELECT clienti assegnati)
db.pt.user=dpt_pt
db.pt.password=dpt_pt_pwd

# Utente Ruolo: Segreteria (Permessi: CRUD anagrafiche clienti e assegnazioni)
db.segreteria.user=dpt_segreteria
db.segreteria.password=dpt_seg_pwd

# Utente Ruolo: Cliente (Permessi: INSERT serie, SELECT propria scheda attiva)
db.cliente.user=dpt_cliente
db.cliente.password=dpt_cli_pwd

# URL di base del Database
db.url=jdbc:mariadb://localhost:3306/digital_personal_trainer
